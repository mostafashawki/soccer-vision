services:
  api:
    build: .
    container_name: soccer-vision-api
    ports:
      - "8004:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build: .
    container_name: soccer-vision-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    depends_on:
      api:
        condition: service_healthy

  labeling:
    build: .
    container_name: soccer-vision-labeling
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./labels:/app/labels
    command: >
      streamlit run scripts/label_tracks.py
      --server.port 8502 --server.address 0.0.0.0 --server.headless true
      -- --predictions output/predictions.csv
         --video data/sample.mp4
         --out labels/ground_truth.csv
    depends_on:
      api:
        condition: service_healthy
